<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Учителски панел</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#2C2318;min-height:100vh;padding:1.2rem;font-family:'Cormorant Garamond',Georgia,serif}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px solid rgba(196,168,130,.3)}
.header h1{font-size:20px;font-style:italic;font-weight:600;color:#FBF6EF}
.header p{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#8B7355;margin-top:2px}
.hright{display:flex;align-items:center;gap:12px}
.live{display:inline-flex;align-items:center;gap:5px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#5A7A4A;padding:3px 10px;border:1px solid rgba(90,122,74,.4);border-radius:2px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#5A7A4A;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.cnt{font-size:11px;color:#8B7355}

/* Exercise controls */
.ex-panel{background:rgba(196,168,130,.06);border:1px solid rgba(196,168,130,.2);border-radius:3px;padding:1rem 1.2rem;margin-bottom:1rem}
.ex-panel-title{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#8B7355;margin-bottom:.8rem}
.ex-buttons{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:.8rem}
.ex-btn{padding:14px 28px;font-family:'Cormorant Garamond',serif;font-size:24px;letter-spacing:.08em;border:1px solid rgba(196,168,130,.4);border-radius:2px;background:transparent;color:#C4A882;cursor:pointer;transition:all .15s}
.ex-btn:hover{border-color:#8B7355;color:#FBF6EF}
.ex-btn.active{background:#8B7355;color:#FFFDF9;border-color:#8B7355}
.ex-active-lbl{font-size:12px;font-style:italic;color:#8B7355}
.ex-active-lbl strong{color:#FBF6EF}
.danger-btn{padding:5px 14px;font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(180,80,60,.4);border-radius:2px;background:transparent;color:#B4503C;cursor:pointer;transition:background .15s}
.danger-btn:hover{background:rgba(180,80,60,.08)}

/* Student grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.card{background:#FFFDF9;border:1px solid #D9C9B0;border-radius:3px;padding:.9rem;cursor:pointer;transition:border-color .2s}
.card:hover{border-color:#8B7355}
.card.complete{border-color:#8B7355}
.card.partial{border-color:#C4A882}
.card.waiting{opacity:.6}
.s-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:.5px solid rgba(196,168,130,.3)}
.s-name{font-size:13px;font-weight:600;color:#2C1F12}
.s-status{font-size:9px;letter-spacing:.08em;text-transform:uppercase}
.s-status.done{color:#5A7A4A}
.s-status.partial{color:#8B7355}
.s-status.wait{color:#C4A882}

/* Mini diamond */
.mini-d{display:flex;flex-direction:column;align-items:center;gap:4px}
.mini-row{display:flex;gap:4px;justify-content:center}
.mini-conn{width:1px;height:5px;background:rgba(196,168,130,.4)}
.mini-slot{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:3px 5px;min-height:22px;min-width:60px;border:.5px solid rgba(196,168,130,.3);color:#C4A882;background:rgba(196,168,130,.06);font-family:'Cormorant Garamond',serif}
.mini-slot.ЛЮБОВ{background:#EDE0CC;border-color:#8B7355;color:#2C1F12}
.mini-slot.НАДЕЖДА{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.mini-slot.ПЕСЕН{background:#FAEEDA;border-color:#EF9F27;color:#412402}
.mini-slot.СЪПРИЧАСТНОСТ{background:#FAECE7;border-color:#D85A30;color:#4A1B0C;font-size:7px}
.mini-slot.ТРУД{background:#F1EFE8;border-color:#888780;color:#2C2C2A}

/* Mini thermo */
.mini-thermo{font-size:11px;color:#2C1F12;font-style:italic;line-height:1.6}

/* Mini wall */
.mini-wall{font-size:11px;font-style:italic;color:#2C1F12;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}

/* Mini cloud */
.mini-cloud{display:flex;flex-wrap:wrap;gap:4px}
.mini-tag{padding:2px 7px;border:.5px solid #C4A882;border-radius:2px;font-size:9px;color:#4A3728;background:#FBF6EF;font-family:'Cormorant Garamond',serif}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(20,14,8,.88);z-index:100;align-items:center;justify-content:center;padding:1.5rem}
.modal-overlay.open{display:flex}
.modal-card{background:#FFFDF9;border:1px solid #C4A882;border-radius:3px;padding:2rem 2.5rem;max-width:520px;width:100%;position:relative;max-height:90vh;overflow-y:auto;animation:fin .18s ease}
@keyframes fin{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-close{position:absolute;top:.8rem;right:1rem;font-size:20px;color:#C4A882;cursor:pointer;background:none;border:none;font-family:'Cormorant Garamond',serif}
.modal-name{text-align:center;font-size:20px;font-weight:600;font-style:italic;color:#2C1F12;margin-bottom:.2rem}
.modal-sub{text-align:center;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#8B7355;margin-bottom:1.5rem}

/* Big diamond */
.big-d{display:flex;flex-direction:column;align-items:center;gap:8px}
.big-row{display:flex;gap:10px;justify-content:center}
.big-conn{width:1px;height:14px;background:rgba(196,168,130,.5)}
.big-slot{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:10px 16px;min-height:48px;min-width:130px;border:1px solid rgba(196,168,130,.3);color:#C4A882;background:rgba(196,168,130,.06);font-family:'Cormorant Garamond',serif}
.big-slot.ЛЮБОВ{background:#EDE0CC;border-color:#8B7355;color:#2C1F12}
.big-slot.НАДЕЖДА{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.big-slot.ПЕСЕН{background:#FAEEDA;border-color:#EF9F27;color:#412402}
.big-slot.СЪПРИЧАСТНОСТ{background:#FAECE7;border-color:#D85A30;color:#4A1B0C;font-size:11px}
.big-slot.ТРУД{background:#F1EFE8;border-color:#888780;color:#2C2C2A}

/* Big thermo */
.big-thermo-item{margin-bottom:.8rem;padding:.6rem;border:.5px solid rgba(196,168,130,.3);border-radius:2px}
.big-thermo-hero{font-size:12px;font-weight:600;color:#2C1F12;margin-bottom:.3rem}
.big-thermo-bar{height:12px;border-radius:6px;background:linear-gradient(to right,#6B9FD4,#C4A882,#D85A30);position:relative;margin-bottom:.2rem}
.big-thermo-marker{position:absolute;top:-3px;width:18px;height:18px;border-radius:50%;background:#FFFDF9;border:2px solid #8B7355;transform:translateX(-50%)}
.big-thermo-val{font-size:11px;color:#8B7355;font-style:italic}

/* Big wall */
.big-wall-text{font-size:17px;font-style:italic;color:#2C1F12;line-height:1.8;text-align:center;padding:.8rem;border:.5px solid rgba(196,168,130,.3);border-radius:2px;background:rgba(196,168,130,.04)}

/* Big cloud */
.big-cloud{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.big-tag{padding:6px 16px;border:1px solid #C4A882;border-radius:2px;font-size:14px;color:#4A3728;background:#FBF6EF;font-family:'Cormorant Garamond',serif;letter-spacing:.06em}

.orn{display:flex;align-items:center;gap:8px;margin:.8rem 0}
.ol{height:1px;flex:1;background:linear-gradient(to right,transparent,rgba(196,168,130,.4),transparent)}
.od{width:5px;height:5px;background:#8B7355;transform:rotate(45deg);flex-shrink:0}
.empty-msg{text-align:center;padding:2.5rem;font-style:italic;font-size:14px;color:#8B7355;grid-column:1/-1}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Учителски панел</h1>
    <p>По жътва · Елин Пелин</p>
  </div>
  <div class="hright">
    <span class="cnt" id="cnt">0 ученика</span>
    <span class="live"><span class="live-dot"></span>На живо</span>
    <button class="danger-btn" onclick="clearAll()">Изчисти всичко</button>
  </div>
</div>

<div class="ex-panel">
  <div class="ex-panel-title">Избери упражнение за учениците</div>
  <div class="ex-buttons">
    <button class="ex-btn" onclick="setEx('diamond')">1. Диамант</button>
    <button class="ex-btn" onclick="setEx('wall')">3. Стена на емпатията</button>
    <button class="ex-btn" onclick="setEx('wordcloud')">4. Облак от думи</button>
    <button class="ex-btn" onclick="setEx(null)" style="border-color:rgba(180,80,60,.4);color:#B4503C">Пауза</button>
  </div>
  <div class="ex-active-lbl" id="ex-active-lbl">Няма активно упражнение</div>
</div>

<div class="orn"><div class="ol"></div><div class="od"></div><div class="ol"></div></div>

<div class="grid" id="grid">
  <div class="empty-msg">Чакаме учениците да се включат...</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-card">
    <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-sub" id="m-sub"></div>
    <div id="m-content"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyAKOl0KE94gHgNNac1qpEth7BtKFfOQkpo",
  authDomain:"diamant-703f1.firebaseapp.com",
  projectId:"diamant-703f1",
  storageBucket:"diamant-703f1.firebasestorage.app",
  messagingSenderId:"5172210587",
  appId:"1:5172210587:web:64f40c40ffb4c7c00e8f3e",
  databaseURL:"https://diamant-703f1-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = firebase.database();

const EX_LABELS = {
  diamond:'Диамант на ценностите',
  wall:'Стена на емпатията',
  wordcloud:'Облак от думи'
};

let currentEx=null, studentsData={};

// Set exercise
window.setEx = function(exId) {
  db.ref('sessions/session1/currentExercise').set(exId||null);
  currentEx=exId;
  document.querySelectorAll('.ex-btn').forEach(b=>b.classList.remove('active'));
  if(exId){
    document.querySelectorAll('.ex-btn').forEach(b=>{
      if(b.textContent.toLowerCase().includes(exId.substring(0,4))||
         b.onclick.toString().includes(`'${exId}'`))b.classList.add('active');
    });
    document.getElementById('ex-active-lbl').innerHTML=`Активно: <strong>${EX_LABELS[exId]||exId}</strong>`;
  } else {
    document.getElementById('ex-active-lbl').textContent='Пауза — учениците чакат';
  }
};

// Sync active exercise button on load
db.ref('sessions/session1/currentExercise').once('value',snap=>{
  const v=snap.val();
  if(v) setEx(v);
});

// Listen students
db.ref('sessions/session1/students').on('value', snap=>{
  studentsData = snap.val()||{};
  renderGrid();
});

function renderGrid(){
  const grid=document.getElementById('grid');
  const students=Object.entries(studentsData).sort(([,a],[,b])=>(a.name||'').localeCompare(b.name||''));
  const n=students.length;
  document.getElementById('cnt').textContent=n+' ученик'+(n===1?'':'а');
  if(!n){grid.innerHTML='<div class="empty-msg">Чакаме учениците да се включат...</div>';return;}
  grid.innerHTML='';

  if(currentEx==='wall'||currentEx==='wordcloud'){
    const summaryCard=document.createElement('div');
    summaryCard.className='card complete';
    summaryCard.style.cssText='border-color:#8B7355;background:#FFFDF9;cursor:pointer';
    const sd=buildSummaryData(currentEx);
    summaryCard.innerHTML='<div class="s-hdr"><span class="s-name" style="color:#8B7355;font-style:italic">Обобщение</span><span class="s-status done">'+sd.count+' отговора</span></div>'+sd.mini;
    summaryCard.onclick=()=>openSummaryModal(currentEx);
    grid.appendChild(summaryCard);
  }

  students.forEach(([key,student])=>{
    const card=document.createElement('div');
    const exData=currentEx&&student.exercises?student.exercises[currentEx]:null;
    const {cls,statusText}=getStatus(exData,currentEx);
    card.className='card '+cls;
    card.innerHTML='<div class="s-hdr"><span class="s-name">'+(student.name||'?')+'</span><span class="s-status '+(cls==='complete'?'done':cls==='partial'?'partial':'wait')+'">'+statusText+'</span></div>'+miniView(exData,currentEx);
    card.onclick=()=>openModal(student,exData,currentEx);
    grid.appendChild(card);
  });
}

function buildSummaryData(exId){
  const all=Object.values(studentsData);
  if(exId==='wall'){
    const entries=all.filter(s=>s.exercises&&s.exercises.wall&&s.exercises.wall.text);
    const mini=entries.length
      ? '<div style="font-size:10px;font-style:italic;color:#8B7355;line-height:1.6">'+entries.slice(0,2).map(s=>'\u201e'+s.exercises.wall.text.substring(0,40)+(s.exercises.wall.text.length>40?'\u2026':'')+'\u201c').join('<br>')+(entries.length>2?'<br>\u2026':'')+'</div>'
      : '<div style="font-size:11px;font-style:italic;color:#C4A882;text-align:center;padding:.4rem">Няма изречения все още</div>';
    return{count:entries.length,mini};
  }
  if(exId==='wordcloud'){
    const allWords=[];
    all.forEach(s=>{if(s.exercises&&s.exercises.wordcloud&&s.exercises.wordcloud.words)allWords.push(...s.exercises.wordcloud.words);});
    const mini=allWords.length
      ? '<div class="mini-cloud">'+[...new Set(allWords)].slice(0,8).map(w=>'<div class="mini-tag">'+w+'</div>').join('')+'</div>'
      : '<div style="font-size:11px;font-style:italic;color:#C4A882;text-align:center;padding:.4rem">Няма думи все още</div>';
    return{count:allWords.length,mini};
  }
  return{count:0,mini:''};
}

let summaryExId=null;
function renderSummaryContent(exId){
  const all=Object.values(studentsData);
  const c=document.getElementById('m-content');
  if(!c||document.getElementById('m-name').textContent!=='Обобщение')return;
  if(exId==='wall'){
    const entries=all.filter(s=>s.exercises&&s.exercises.wall&&s.exercises.wall.text);
    if(!entries.length){c.innerHTML='<p style="text-align:center;font-style:italic;color:#8B7355;margin-top:1rem">Няма изпратени изречения все още.</p>';}
    else{c.innerHTML='<div style="display:flex;flex-direction:column;gap:10px">'+entries.map(s=>'<div style="padding:.8rem;border:.5px solid rgba(196,168,130,.4);border-radius:2px;background:rgba(196,168,130,.04)"><div style="font-size:17px;font-style:italic;color:#2C1F12;line-height:1.7">\u201e'+s.exercises.wall.text+'\u201c</div></div>').join('')+'</div>';}
  } else if(exId==='wordcloud'){
    const wordMap={};
    all.forEach(s=>{if(s.exercises&&s.exercises.wordcloud&&s.exercises.wordcloud.words)s.exercises.wordcloud.words.forEach(w=>{wordMap[w]=(wordMap[w]||0)+1;});});
    const sorted=Object.entries(wordMap).sort(([,a],[,b])=>b-a);
    if(!sorted.length){c.innerHTML='<p style="text-align:center;font-style:italic;color:#8B7355;margin-top:1rem">Няма изпратени думи все още.</p>';}
    else{const mx=sorted[0][1];c.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:.5rem">'+sorted.map(([w,n])=>{const sz=12+Math.round((n/mx)*12);return'<div style="padding:6px 14px;border:1px solid #C4A882;border-radius:2px;background:#FBF6EF;font-family:\'Cormorant Garamond\',serif;font-size:'+sz+'px;color:#4A3728;letter-spacing:.06em">'+w+(n>1?'<span style="font-size:9px;color:#8B7355;margin-left:4px">\xd7'+n+'</span>':'')+'</div>';}).join('')+'</div>';}
  }
}
window.openSummaryModal=function(exId){
  document.getElementById('m-name').textContent='Обобщение';
  document.getElementById('m-sub').textContent=EX_LABELS[exId]||exId;
  summaryExId=exId;
  renderSummaryContent(exId);
  db.ref('sessions/session1/spotlight').set('__summary__');
  db.ref('sessions/session1/spotlightSummary').set({exId,ts:Date.now()});
  document.getElementById('modal').classList.add('open');
};

function getStatus(exData,exId){
  if(!exId||!exData)return{cls:'waiting',statusText:'чака...'};
  if(exId==='diamond'){
    const filled=Object.values(exData.slots||{}).filter(Boolean).length;
    if(filled===5)return{cls:'complete',statusText:'✓ завършен'};
    if(filled>0)return{cls:'partial',statusText:`${filled}/5`};
    return{cls:'waiting',statusText:'не е започнал'};
  }
  if(exId==='wall')return exData.text?{cls:'complete',statusText:'✓ изпратено'}:{cls:'waiting',statusText:'не е написал'};
  if(exId==='wordcloud'){const n=(exData.words||[]).length;return n>0?{cls:n>=5?'complete':'partial',statusText:`${n}/5 думи`}:{cls:'waiting',statusText:'не е изпратил'};}
  return{cls:'waiting',statusText:'чака...'};
}

function miniView(exData,exId){
  if(!exId||!exData)return'<div style="font-size:11px;font-style:italic;color:#C4A882;text-align:center;padding:.5rem">Изчаква упражнение</div>';
  if(exId==='diamond'){
    const slots=exData.slots||{};
    const layout=[['s0'],['s1','s2'],['s3'],['s4']];
    let h='<div class="mini-d">';
    layout.forEach((row,ri)=>{
      if(ri>0)h+='<div class="mini-conn"></div>';
      h+='<div class="mini-row">';
      row.forEach(id=>{const w=slots[id];h+=`<div class="mini-slot${w?' '+w:''}">${w||'—'}</div>`;});
      h+='</div>';
    });
    return h+'</div>';
  }
  if(exId==='wall')return`<div class="mini-wall">${exData.text||'—'}</div>`;
  if(exId==='wordcloud'){
    const words=exData.words||[];
    return'<div class="mini-cloud">'+words.map(w=>`<div class="mini-tag">${w}</div>`).join('')+'</div>';
  }
  return'';
}

// Modal
let modalStudent=null;
window.openModal=function(student,exData,exId){
  modalStudent={student,exData,exId};
  // Find student key
  const key=Object.keys(studentsData).find(k=>studentsData[k].name===student.name)||null;
  // Broadcast spotlight to monitoring screen
  db.ref('sessions/session1/spotlight').set(key);
  document.getElementById('m-name').textContent=student.name||'?';
  document.getElementById('m-sub').textContent=exId?EX_LABELS[exId]||exId:'Няма активно упражнение';
  renderModalContent(exData,exId);
  document.getElementById('modal').classList.add('open');
};
window.closeModal=function(){
  document.getElementById('modal').classList.remove('open');
  // Clear spotlight on monitoring screen
  db.ref('sessions/session1/spotlight').set(null);
};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function renderModalContent(exData,exId){
  const c=document.getElementById('m-content');
  if(!exId||!exData){c.innerHTML='<p style="text-align:center;font-style:italic;color:#8B7355;margin-top:1rem">Ученикът изчаква упражнение.</p>';return;}
  if(exId==='diamond'){
    const slots=exData.slots||{};
    const layout=[['s0'],['s1','s2'],['s3'],['s4']];
    let h='<div class="big-d">';
    layout.forEach((row,ri)=>{
      if(ri>0)h+='<div class="big-conn"></div>';
      h+='<div class="big-row">';
      row.forEach(id=>{const w=slots[id];h+=`<div class="big-slot${w?' '+w:''}">${w||'—'}</div>`;});
      h+='</div>';
    });
    c.innerHTML=h+'</div>';

  } else if(exId==='wall'){
    c.innerHTML=`<div class="big-wall-text">${exData.text||'—'}</div>`;
  } else if(exId==='wordcloud'){
    const words=exData.words||[];
    c.innerHTML='<div class="big-cloud">'+words.map(w=>`<div class="big-tag">${w}</div>`).join('')+'</div>';
  }
}


// Auto-refresh modal when data changes
db.ref('sessions/session1/students').on('value',snap=>{
  studentsData=snap.val()||{};renderGrid();
  if(modalStudent){
    const key=Object.keys(studentsData).find(k=>studentsData[k].name===modalStudent.student.name);
    if(key){
      const updated=studentsData[key];
      const exData=currentEx&&updated.exercises?updated.exercises[currentEx]:null;
      renderModalContent(exData,currentEx);
    }
  }
  // Auto-refresh summary modal if open
  if(summaryExId && document.getElementById('modal').classList.contains('open')){
    renderSummaryContent(summaryExId);
  }
});

window.clearAll=function(){
  if(confirm('Изтриване на всички ученици и отговори?'))
    db.ref('sessions/session1').remove();
};
</script>
</body>
</html>
