<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Учителски панел</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#2C2318;min-height:100vh;padding:1.2rem;font-family:'Cormorant Garamond',Georgia,serif}

/* Lesson picker */
.lesson-picker{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:2rem}
.picker-title{font-size:24px;font-style:italic;font-weight:600;color:#FBF6EF;text-align:center}
.picker-sub{font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:#8B7355;text-align:center}
.picker-btns{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.picker-btn{padding:24px 48px;font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;font-weight:600;letter-spacing:.06em;border:1px solid #C4A882;border-radius:3px;background:rgba(196,168,130,.06);color:#FBF6EF;cursor:pointer;transition:all .2s;text-align:center}
.picker-btn:hover{background:rgba(196,168,130,.16);border-color:#8B7355}
.picker-btn span{display:block;font-size:11px;font-style:normal;letter-spacing:.12em;text-transform:uppercase;color:#8B7355;margin-top:6px}

/* Main panel */
#main-panel{display:none}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px solid rgba(196,168,130,.3)}
.header h1{font-size:20px;font-style:italic;font-weight:600;color:#FBF6EF}
.header p{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#8B7355;margin-top:2px}
.hright{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.live{display:inline-flex;align-items:center;gap:5px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#5A7A4A;padding:3px 10px;border:1px solid rgba(90,122,74,.4);border-radius:2px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#5A7A4A;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.cnt{font-size:11px;color:#8B7355}
.lesson-badge{font-size:12px;font-style:italic;font-weight:600;color:#C4A882;border:.5px solid rgba(196,168,130,.4);padding:3px 12px;border-radius:2px;cursor:pointer}
.lesson-badge:hover{background:rgba(196,168,130,.1)}

.ex-panel{background:rgba(196,168,130,.06);border:1px solid rgba(196,168,130,.2);border-radius:3px;padding:1rem 1.2rem;margin-bottom:1rem}
.ex-panel-title{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#8B7355;margin-bottom:.8rem}
.ex-buttons{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:.8rem}
.ex-btn{padding:14px 28px;font-family:'Cormorant Garamond',serif;font-size:24px;letter-spacing:.08em;border:1px solid rgba(196,168,130,.4);border-radius:2px;background:transparent;color:#C4A882;cursor:pointer;transition:all .15s}
.ex-btn:hover{border-color:#8B7355;color:#FBF6EF}
.ex-btn.active{background:#8B7355;color:#FFFDF9;border-color:#8B7355}
.ex-active-lbl{font-size:12px;font-style:italic;color:#8B7355}
.ex-active-lbl strong{color:#FBF6EF}
.danger-btn{padding:5px 14px;font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(180,80,60,.4);border-radius:2px;background:transparent;color:#B4503C;cursor:pointer;transition:background .15s}
.danger-btn:hover{background:rgba(180,80,60,.08)}
.qr-btn{padding:5px 14px;font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(196,168,130,.4);border-radius:2px;background:transparent;color:#C4A882;cursor:pointer;transition:background .15s}
.qr-btn:hover{background:rgba(196,168,130,.1)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.card{background:#FFFDF9;border:1px solid #D9C9B0;border-radius:3px;padding:.9rem;cursor:pointer;transition:border-color .2s}
.card:hover{border-color:#8B7355}
.card.complete{border-color:#8B7355}
.card.partial{border-color:#C4A882}
.card.waiting{opacity:.6}
.s-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:.5px solid rgba(196,168,130,.3)}
.s-name{font-size:13px;font-weight:600;color:#2C1F12}
.s-status{font-size:9px;letter-spacing:.08em;text-transform:uppercase}
.s-status.done{color:#5A7A4A}
.s-status.partial{color:#8B7355}
.s-status.wait{color:#C4A882}

.mini-d{display:flex;flex-direction:column;align-items:center;gap:4px}
.mini-row{display:flex;gap:4px;justify-content:center}
.mini-conn{width:1px;height:5px;background:rgba(196,168,130,.4)}
.mini-slot{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:3px 5px;min-height:22px;min-width:60px;border:.5px solid rgba(196,168,130,.3);color:#C4A882;background:rgba(196,168,130,.06);font-family:'Cormorant Garamond',serif}
.mini-slot.ЛЮБОВ{background:#EDE0CC;border-color:#8B7355;color:#2C1F12}
.mini-slot.НАДЕЖДА{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.mini-slot.ПЕСЕН{background:#FAEEDA;border-color:#EF9F27;color:#412402}
.mini-slot.СЪПРИЧАСТНОСТ{background:#FAECE7;border-color:#D85A30;color:#4A1B0C;font-size:7px}
.mini-slot.ТРУД{background:#F1EFE8;border-color:#888780;color:#2C2C2A}
.mini-wall{font-size:11px;font-style:italic;color:#2C1F12;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.mini-cloud{display:flex;flex-wrap:wrap;gap:4px}
.mini-tag{padding:2px 7px;border:.5px solid #C4A882;border-radius:2px;font-size:9px;color:#4A3728;background:#FBF6EF;font-family:'Cormorant Garamond',serif}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(20,14,8,.88);z-index:100;align-items:center;justify-content:center;padding:1.5rem}
.modal-overlay.open{display:flex}
.modal-card{background:#FFFDF9;border:1px solid #C4A882;border-radius:3px;padding:2rem 2.5rem;max-width:520px;width:100%;position:relative;max-height:90vh;overflow-y:auto;animation:fin .18s ease}
@keyframes fin{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-close{position:absolute;top:.8rem;right:1rem;font-size:20px;color:#C4A882;cursor:pointer;background:none;border:none;font-family:'Cormorant Garamond',serif}
.modal-name{text-align:center;font-size:20px;font-weight:600;font-style:italic;color:#2C1F12;margin-bottom:.2rem}
.modal-sub{text-align:center;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#8B7355;margin-bottom:1.5rem}

.big-d{display:flex;flex-direction:column;align-items:center;gap:8px}
.big-row{display:flex;gap:10px;justify-content:center}
.big-conn{width:1px;height:14px;background:rgba(196,168,130,.5)}
.big-slot{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:10px 16px;min-height:48px;min-width:130px;border:1px solid rgba(196,168,130,.3);color:#C4A882;background:rgba(196,168,130,.06);font-family:'Cormorant Garamond',serif}
.big-slot.ЛЮБОВ{background:#EDE0CC;border-color:#8B7355;color:#2C1F12}
.big-slot.НАДЕЖДА{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.big-slot.ПЕСЕН{background:#FAEEDA;border-color:#EF9F27;color:#412402}
.big-slot.СЪПРИЧАСТНОСТ{background:#FAECE7;border-color:#D85A30;color:#4A1B0C;font-size:11px}
.big-slot.ТРУД{background:#F1EFE8;border-color:#888780;color:#2C2C2A}
.big-wall-text{font-size:17px;font-style:italic;color:#2C1F12;line-height:1.9;text-align:center;padding:.8rem;border:.5px solid rgba(196,168,130,.3);border-radius:2px;background:rgba(196,168,130,.04)}
.big-cloud{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.big-tag{padding:7px 18px;border:1px solid #C4A882;border-radius:2px;font-size:15px;color:#4A3728;background:#FBF6EF;font-family:'Cormorant Garamond',serif;letter-spacing:.06em}

.orn{display:flex;align-items:center;gap:8px;margin:.8rem 0}
.ol{height:1px;flex:1;background:linear-gradient(to right,transparent,rgba(196,168,130,.4),transparent)}
.od{width:5px;height:5px;background:#8B7355;transform:rotate(45deg);flex-shrink:0}
.empty-msg{text-align:center;padding:2.5rem;font-style:italic;font-size:14px;color:#8B7355;grid-column:1/-1}
</style>
</head>
<body>

<!-- Lesson Picker -->
<div class="lesson-picker" id="lesson-picker">
  <div>
    <div class="picker-title">Учителски панел</div>
    <div class="picker-sub" style="margin-top:.4rem">По жътва · Елин Пелин</div>
  </div>
  <div class="picker-btns">
    <div class="picker-btn" onclick="selectLesson('lesson1')">
      Урок 1
    </div>
    <div class="picker-btn" onclick="selectLesson('lesson2')">
      Урок 2
    </div>
  </div>
</div>

<!-- Main Panel -->
<div id="main-panel">
  <div class="header">
    <div>
      <h1 id="panel-title">Учителски панел</h1>
      <p>По жътва · Елин Пелин</p>
    </div>
    <div class="hright">
      <span class="lesson-badge" id="lesson-badge" onclick="switchLesson()" title="Смени урок">Урок 1 ↓</span>
      <span class="cnt" id="cnt">0 ученика</span>
      <span class="live"><span class="live-dot"></span>На живо</span>
      <button class="qr-btn" onclick="toggleQR()">QR код</button>
      <button class="danger-btn" onclick="clearAll()">Изчисти</button>
      <button class="danger-btn" style="font-size:13px;padding:7px 18px;border-color:rgba(180,80,60,.7);color:#D84040;font-weight:600" onclick="endSession()">Край</button>
    </div>
  </div>

  <div class="ex-panel">
    <div class="ex-panel-title">Избери упражнение за учениците</div>
    <div class="ex-buttons" id="ex-buttons"></div>
    <div class="ex-active-lbl" id="ex-active-lbl">Няма активно упражнение</div>
  </div>

  <div class="orn"><div class="ol"></div><div class="od"></div><div class="ol"></div></div>
  <div class="grid" id="grid"><div class="empty-msg">Чакаме учениците да се включат...</div></div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-card">
    <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-sub" id="m-sub"></div>
    <div id="m-content"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyAKOl0KE94gHgNNac1qpEth7BtKFfOQkpo",
  authDomain:"diamant-703f1.firebaseapp.com",
  projectId:"diamant-703f1",
  storageBucket:"diamant-703f1.firebasestorage.app",
  messagingSenderId:"5172210587",
  appId:"1:5172210587:web:64f40c40ffb4c7c00e8f3e",
  databaseURL:"https://diamant-703f1-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = firebase.database();

const LESSONS = {
  lesson1: {
    label: 'Урок 1',
    exercises: {
      teams: 'Екипни задачи',
      wordcloud: 'Облак от думи'
    }
  },
  lesson2: {
    label: 'Урок 2',
    exercises: {
      diamond: 'Диамант на ценностите',
      wall: 'Стена на емпатията',
      wordcloud: 'Облак от думи'
    }
  }
};

let currentLesson = null, currentEx = null, studentsData = {}, modalStudent = null, summaryExId = null;
let studentsListener = null, exListener = null;

window.selectLesson = function(lessonId) {
  db.ref('currentLesson').set(lessonId);
  currentLesson = lessonId;
  document.getElementById('lesson-picker').style.display = 'none';
  document.getElementById('main-panel').style.display = 'block';
  const L = LESSONS[lessonId];
  document.getElementById('panel-title').textContent = L.label;
  document.getElementById('lesson-badge').textContent = L.label + ' ↓';
  buildExButtons(lessonId);
  listenStudents(lessonId);
  // Sync active exercise
  db.ref(lessonId + '/currentExercise').once('value', snap => {
    const v = snap.val();
    if (v) highlightExBtn(v);
    currentEx = v;
    document.getElementById('ex-active-lbl').innerHTML = v ? 'Активно: <strong>' + LESSONS[lessonId].exercises[v] + '</strong>' : 'Няма активно упражнение';
    renderGrid();
  });
};

window.switchLesson = function() {
  // Stop listeners
  if (studentsListener) db.ref(currentLesson+'/students').off('value', studentsListener);
  document.getElementById('main-panel').style.display = 'none';
  document.getElementById('lesson-picker').style.display = 'flex';
  currentEx = null; studentsData = {};
  document.getElementById('grid').innerHTML = '<div class="empty-msg">Чакаме учениците да се включат...</div>';
};

function buildExButtons(lessonId) {
  const container = document.getElementById('ex-buttons');
  container.innerHTML = '';
  const exes = LESSONS[lessonId].exercises;
  let i = 1;
  Object.entries(exes).forEach(([id, label]) => {
    const btn = document.createElement('button');
    btn.className = 'ex-btn';
    btn.id = 'exbtn-' + id;
    btn.textContent = i + '. ' + label;
    btn.onclick = () => setEx(id);
    container.appendChild(btn);
    i++;
  });
  const pauseBtn = document.createElement('button');
  pauseBtn.className = 'ex-btn';
  pauseBtn.style.cssText = 'border-color:rgba(180,80,60,.4);color:#B4503C';
  pauseBtn.textContent = 'Пауза';
  pauseBtn.onclick = () => setEx(null);
  container.appendChild(pauseBtn);
}

function highlightExBtn(exId) {
  document.querySelectorAll('.ex-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('exbtn-' + exId);
  if (btn) btn.classList.add('active');
}

window.setEx = function(exId) {
  db.ref(currentLesson + '/currentExercise').set(exId || null);
  currentEx = exId;
  highlightExBtn(exId);
  const L = LESSONS[currentLesson];
  document.getElementById('ex-active-lbl').innerHTML = exId
    ? 'Активно: <strong>' + (L.exercises[exId]||exId) + '</strong>'
    : 'Пауза — учениците чакат';
  renderGrid();
};

function listenStudents(lessonId) {
  db.ref(lessonId + '/students').on('value', snap => {
    studentsData = snap.val() || {};
    const n = Object.keys(studentsData).length;
    document.getElementById('cnt').textContent = n + ' ученик' + (n===1?'':'а');
    renderGrid();
    if (summaryExId && document.getElementById('modal').classList.contains('open')) {
      renderSummaryContent(summaryExId);
    }
    if (modalStudent) {
      const key = Object.keys(studentsData).find(k => studentsData[k].name === modalStudent.name);
      if (key) renderModalContent(studentsData[key].exercises?.[currentEx], currentEx);
    }
  });
}

function getStatus(exData, exId) {
  if (!exId || !exData) return {cls:'waiting', txt:'чака...'};
  if (exId==='diamond') {
    const n = Object.values(exData.slots||{}).filter(Boolean).length;
    if (n===5) return {cls:'complete', txt:'✓ завършен'};
    if (n>0) return {cls:'partial', txt: n+'/5'};
    return {cls:'waiting', txt:'не е започнал'};
  }
  if (exId==='wall') return exData.text ? {cls:'complete', txt:'✓ изпратено'} : {cls:'waiting', txt:'не е написал'};
  if (exId==='wordcloud') {
    const n=(exData.words||[]).length;
    return n>0 ? {cls:n>=5?'complete':'partial', txt:n+'/5 думи'} : {cls:'waiting', txt:'не е изпратил'};
  }
  return {cls:'waiting', txt:'чака...'};
}

function miniView(exData, exId) {
  if (!exId || !exData) return '<div style="font-size:11px;font-style:italic;color:#C4A882;text-align:center;padding:.5rem">Изчаква упражнение</div>';
  if (exId==='diamond') {
    const slots=exData.slots||{};
    const layout=[['s0'],['s1','s2'],['s3'],['s4']];
    let h='<div class="mini-d">';
    layout.forEach((row,ri)=>{if(ri>0)h+='<div class="mini-conn"></div>';h+='<div class="mini-row">';row.forEach(id=>{const w=slots[id];h+='<div class="mini-slot'+(w?' '+w:'')+'">'+( w||'—')+'</div>';});h+='</div>';});
    return h+'</div>';
  }
  if (exId==='wall') return '<div class="mini-wall">'+(exData.text||'—')+'</div>';
  if (exId==='wordcloud') {
    const words=exData.words||[];
    return '<div class="mini-cloud">'+words.map(w=>'<div class="mini-tag">'+w+'</div>').join('')+'</div>';
  }
  return '';
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const students = Object.entries(studentsData).sort(([,a],[,b])=>(a.name||'').localeCompare(b.name||''));
  grid.innerHTML = '';
  if (currentEx==='teams') {
    grid.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">' +
      ['БИОГРАФИ И ЛЕКСИКОЛОЗИ','ЕТНОГРАФИ','АРТ-ИЗСЛЕДОВАТЕЛИ','МУЗИКАЛНИ РЕДАКТОРИ'].map((name,i) => {
        const colors = ['#3A6DB5','#2E7D52','#C05A18','#7B3FA6'];
        const borders = ['#5B8DD9','#4CAF7D','#E07B39','#9B59B6'];
        return '<div style="background:#FFFDF9;border:2px solid '+borders[i]+';border-radius:4px;padding:1.2rem 1.4rem;cursor:pointer" onclick="openTeamModal(this.dataset.name)" data-name="'+name+'">' +
          '<div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#AAAAAA;margin-bottom:.3rem">Екип</div>' +
          '<div style="font-size:17px;font-weight:700;color:'+colors[i]+';font-family:serif">'+name+'</div>' +
        '</div>';
      }).join('') +
    '</div>';
    return;
  }
  if (!students.length) { grid.innerHTML='<div class="empty-msg">Чакаме учениците да се включат...</div>'; return; }
  if (currentEx==='wall'||currentEx==='wordcloud') {
    const sd = buildSummaryData(currentEx);
    const sc = document.createElement('div');
    sc.className = 'card complete';
    sc.style.cssText = 'border-color:#8B7355;cursor:pointer';
    sc.innerHTML = '<div class="s-hdr"><span class="s-name" style="color:#8B7355;font-style:italic">Обобщение</span><span class="s-status done">'+sd.count+' отговора</span></div>'+sd.mini;
    sc.onclick = () => openSummaryModal(currentEx);
    grid.appendChild(sc);
  }
  students.forEach(([key,student]) => {
    const exData = currentEx && student.exercises ? student.exercises[currentEx] : null;
    const {cls,txt} = getStatus(exData, currentEx);
    const card = document.createElement('div');
    card.className = 'card '+cls;
    card.innerHTML = '<div class="s-hdr"><span class="s-name">'+(student.name||'?')+'</span><span class="s-status '+(cls==='complete'?'done':cls==='partial'?'partial':'wait')+'">'+txt+'</span></div>'+miniView(exData,currentEx);
    card.onclick = () => openModal(student, exData, currentEx);
    grid.appendChild(card);
  });
}

function buildSummaryData(exId) {
  const all = Object.values(studentsData);
  if (exId==='wall') {
    const entries = all.filter(s=>s.exercises&&s.exercises.wall&&s.exercises.wall.text);
    const mini = entries.length ? '<div style="font-size:10px;font-style:italic;color:#8B7355;line-height:1.6">'+entries.slice(0,2).map(s=>'„'+s.exercises.wall.text.substring(0,40)+(s.exercises.wall.text.length>40?'…':'')+'“').join('<br>')+(entries.length>2?'<br>…':'')+'</div>' : '<div style="font-size:11px;font-style:italic;color:#C4A882;text-align:center;padding:.4rem">Няма изречения все още</div>';
    return {count:entries.length, mini};
  }
  if (exId==='wordcloud') {
    const allWords=[];
    all.forEach(s=>{if(s.exercises&&s.exercises.wordcloud&&s.exercises.wordcloud.words)allWords.push(...s.exercises.wordcloud.words);});
    const mini = allWords.length ? '<div class="mini-cloud">'+[...new Set(allWords)].slice(0,8).map(w=>'<div class="mini-tag">'+w+'</div>').join('')+'</div>' : '<div style="font-size:11px;font-style:italic;color:#C4A882;text-align:center;padding:.4rem">Няма думи все още</div>';
    return {count:allWords.length, mini};
  }
  return {count:0, mini:''};
}

function renderSummaryContent(exId) {
  const all = Object.values(studentsData);
  const c = document.getElementById('m-content');
  if (!c) return;
  if (exId==='wall') {
    const entries = all.filter(s=>s.exercises&&s.exercises.wall&&s.exercises.wall.text);
    if (!entries.length) c.innerHTML='<p style="text-align:center;font-style:italic;color:#8B7355;margin-top:1rem">Няма изпратени изречения все още.</p>';
    else c.innerHTML='<div style="display:flex;flex-direction:column;gap:10px">'+entries.map(s=>'<div style="padding:.8rem;border:.5px solid rgba(196,168,130,.4);border-radius:2px;background:rgba(196,168,130,.04)"><div style="font-size:17px;font-style:italic;color:#2C1F12;line-height:1.7">„'+s.exercises.wall.text+'“</div></div>').join('')+'</div>';
  } else if (exId==='wordcloud') {
    const wordMap={};
    all.forEach(s=>{if(s.exercises&&s.exercises.wordcloud&&s.exercises.wordcloud.words)s.exercises.wordcloud.words.forEach(w=>{wordMap[w]=(wordMap[w]||0)+1;});});
    const sorted = Object.entries(wordMap).sort(([,a],[,b])=>b-a);
    if (!sorted.length) c.innerHTML='<p style="text-align:center;font-style:italic;color:#8B7355;margin-top:1rem">Няма изпратени думи все още.</p>';
    else { const mx=sorted[0][1]; c.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:.5rem">'+sorted.map(([w,n])=>{const sz=12+Math.round((n/mx)*12);return'<div style="padding:6px 14px;border:1px solid #C4A882;border-radius:2px;background:#FBF6EF;font-family:\'Cormorant Garamond\',serif;font-size:'+sz+'px;color:#4A3728">'+w+(n>1?'<span style="font-size:9px;color:#8B7355;margin-left:4px">×'+n+'</span>':'')+'</div>';}).join('')+'</div>'; }
  }
}

window.openTeamModal = function(name) {
  summaryExId = null;
  document.getElementById('m-name').textContent = name;
  document.getElementById('m-sub').textContent = 'Урок 1 · Екипна задача';
  const c = document.getElementById('m-content');
  const task = TEAM_TASKS[name] || '';
  let html = '<p style="font-size:16px;font-style:italic;color:#2C1F12;line-height:1.9;font-family:\'Cormorant Garamond\',serif">' + task + '</p>';
  if (name === 'АРТ-ИЗСЛЕДОВАТЕЛИ') {
    html += '<div style="text-align:center;margin-top:1rem"><button onclick="toggleTeamPainting()" style="padding:8px 22px;font-family:\'Cormorant Garamond\',serif;font-size:14px;letter-spacing:.08em;border:1px solid #E07B39;border-radius:2px;background:transparent;color:#C05A18;cursor:pointer">Виж картината</button></div>';
    html += '<img id="team-painting" src="' + PAINTING_B64 + '" style="width:100%;border-radius:3px;margin-top:1rem;border:1px solid #D9C9B0;display:none">';
    html += '<div id="team-painting-cap" style="font-size:11px;color:#8B7355;text-align:center;margin-top:.4rem;font-style:italic;display:none">Жътва — Владимир Димитров-Майстора</div>';
  }
  c.innerHTML = html;
  // Map name to id for broadcast
  const idMap = {'БИОГРАФИ И ЛЕКСИКОЛОЗИ':'БИОГРАФИ','ЕТНОГРАФИ':'ЕТНОГРАФИ','АРТ-ИЗСЛЕДОВАТЕЛИ':'АРТ','МУЗИКАЛНИ РЕДАКТОРИ':'МУЗИКАЛНИ'};
  const teamId = idMap[name] || name;
  db.ref(currentLesson+'/spotlight').set('__team__'+teamId);
  db.ref(currentLesson+'/spotlightSummary').set(null);
  document.getElementById('modal').classList.add('open');
};

window.toggleTeamPainting = function() {
  const img = document.getElementById('team-painting');
  const cap = document.getElementById('team-painting-cap');
  if (!img) return;
  const show = img.style.display !== 'block';
  img.style.display = show ? 'block' : 'none';
  if (cap) cap.style.display = show ? 'block' : 'none';
  db.ref(currentLesson + '/showPainting').set(show);
};

window.openSummaryModal = function(exId) {
  summaryExId = exId;
  const L = LESSONS[currentLesson];
  document.getElementById('m-name').textContent = 'Обобщение';
  document.getElementById('m-sub').textContent = L.exercises[exId] || exId;
  renderSummaryContent(exId);
  db.ref(currentLesson+'/spotlight').set('__summary__');
  db.ref(currentLesson+'/spotlightSummary').set({exId, ts:Date.now()});
  document.getElementById('modal').classList.add('open');
};

window.openModal = function(student, exData, exId) {
  modalStudent = student;
  const key = Object.keys(studentsData).find(k=>studentsData[k].name===student.name) || null;
  db.ref(currentLesson+'/spotlight').set(key);
  document.getElementById('m-name').textContent = student.name||'?';
  const L = LESSONS[currentLesson];
  document.getElementById('m-sub').textContent = exId ? (L.exercises[exId]||exId) : 'Няма активно упражнение';
  renderModalContent(exData, exId);
  document.getElementById('modal').classList.add('open');
};

window.closeModal = function() {
  document.getElementById('modal').classList.remove('open');
  db.ref(currentLesson+'/spotlight').set(null);
  summaryExId = null; modalStudent = null;
};
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

function renderModalContent(exData, exId) {
  const c = document.getElementById('m-content');
  if (!exId || !exData) { c.innerHTML='<p style="text-align:center;font-style:italic;color:#8B7355;margin-top:1rem">Ученикът изчаква упражнение.</p>'; return; }
  if (exId==='diamond') {
    const slots=exData.slots||{};
    const layout=[['s0'],['s1','s2'],['s3'],['s4']];
    let h='<div class="big-d">';
    layout.forEach((row,ri)=>{if(ri>0)h+='<div class="big-conn"></div>';h+='<div class="big-row">';row.forEach(id=>{const w=slots[id];h+='<div class="big-slot'+(w?' '+w:'')+'">'+( w||'—')+'</div>';});h+='</div>';});
    c.innerHTML=h+'</div>';
  } else if (exId==='wall') {
    c.innerHTML='<div class="big-wall-text">'+(exData.text||'—')+'</div>';
  } else if (exId==='wordcloud') {
    const words=exData.words||[];
    c.innerHTML='<div class="big-cloud">'+words.map(w=>'<div class="big-tag">'+w+'</div>').join('')+'</div>';
  }

window.toggleQR = function() {
  db.ref(currentLesson+'/showQR').once('value', snap => {
    db.ref(currentLesson+'/showQR').set(!snap.val());
  });
};

window.endSession = function() {
  if (confirm('Край на сесията — всички ученици ще бъдат върнати на началния екран и данните ще бъдат изтрити. Продължаваш?')) {
    // Signal reset to all clients, then wipe everything
    db.ref('reset').set(true).then(() => {
      setTimeout(() => {
        db.ref('/').remove().then(() => {
          document.getElementById('main-panel').style.display = 'none';
          document.getElementById('lesson-picker').style.display = 'flex';
          currentLesson = null; currentEx = null; studentsData = {};
        });
      }, 1500);
    });
  }
};

window.clearAll = function() {
  if (confirm('Изтриване на всички ученици и отговори от ' + (LESSONS[currentLesson]?.label||'урока') + '?'))
    db.ref(currentLesson+'/students').remove();
};
</script>
