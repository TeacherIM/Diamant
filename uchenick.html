<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Литературни дейности</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#2C2318;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem 3rem;font-family:'Cormorant Garamond',Georgia,serif}
.card{background:#FFFDF9;border:1px solid #D9C9B0;border-radius:3px;padding:2rem 1.8rem 1.8rem;max-width:560px;width:100%}
.orn{display:flex;align-items:center;gap:10px;margin-bottom:.3rem}
.ol{height:1px;flex:1;background:linear-gradient(to right,transparent,#8B7355,transparent)}
.od{width:7px;height:7px;background:#8B7355;transform:rotate(45deg);flex-shrink:0}
.app-title{text-align:center;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#8B7355;margin-bottom:.1rem}
.app-sub{text-align:center;font-size:20px;font-weight:600;font-style:italic;color:#2C1F12;margin-bottom:1.5rem}

/* Name screen */
#name-screen{text-align:center;padding:1.5rem 0}
#name-screen h2{font-size:18px;font-weight:600;font-style:italic;color:#2C1F12;margin-bottom:.4rem}
#name-screen p{font-size:12px;color:#8B7355;letter-spacing:.08em;margin-bottom:1.2rem}
#name-input{font-family:'Cormorant Garamond',serif;font-size:18px;border:none;border-bottom:1px solid #C4A882;background:transparent;color:#2C1F12;padding:8px 4px;width:260px;text-align:center;outline:none}
#name-input:focus{border-bottom-color:#8B7355}
.lit-btn{padding:8px 28px;font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.12em;text-transform:uppercase;border:1px solid #C4A882;border-radius:2px;background:transparent;color:#8B7355;cursor:pointer;transition:background .15s;display:inline-block;margin-top:1.2rem}
.lit-btn:hover{background:rgba(196,168,130,.14)}

/* Wait screen */
#wait-screen{display:none;text-align:center;padding:2rem 0}
#wait-screen p{font-size:14px;font-style:italic;color:#8B7355;margin-bottom:.5rem}
.wait-dots{display:flex;justify-content:center;gap:6px;margin-top:1rem}
.wait-dot{width:8px;height:8px;border-radius:50%;background:#C4A882;animation:bounce 1.2s infinite}
.wait-dot:nth-child(2){animation-delay:.2s}
.wait-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* Exercise screen */
#ex-screen{display:none}
.ex-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:.5px solid rgba(196,168,130,.3)}
.ex-name{font-size:12px;color:#8B7355;letter-spacing:.08em}
.sync-row{display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#C4A882}
.sync-dot.ok{background:#5A7A4A}
.sync-lbl{font-size:10px;color:#8B7355;letter-spacing:.08em}
.lesson-tag{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#C4A882;border:.5px solid rgba(196,168,130,.4);padding:2px 8px;border-radius:2px}
.ex-title{text-align:center;font-size:16px;font-weight:600;font-style:italic;color:#2C1F12;margin-bottom:.3rem}
.ex-instr{text-align:center;font-size:12px;font-style:italic;color:#8B7355;margin-bottom:1.4rem;line-height:1.6}

/* DIAMOND */
.pool-label,.diamond-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#8B7355;margin-bottom:.6rem;text-align:center}
.words-pool{display:flex;flex-direction:column;gap:8px;padding:12px;border:1px solid #C4A882;border-radius:2px;background:rgba(196,168,130,.05);position:relative;margin-bottom:1.2rem}
.words-pool.drag-over{background:rgba(196,168,130,.14)}
.word-chip{padding:8px 16px;border:1px solid #C4A882;border-radius:2px;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;letter-spacing:.1em;color:#4A3728;background:#FBF6EF;cursor:grab;user-select:none;text-align:center;text-transform:uppercase;position:relative;touch-action:none}
.word-chip:active{cursor:grabbing}
.word-chip.dragging{opacity:.25}
.diamond-wrap{position:relative;max-width:360px;margin:0 auto}
.conn-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.d-row{display:flex;justify-content:center;gap:10px;margin-bottom:10px}
.drop-slot{width:150px;height:58px;border:1px dashed #C4A882;border-radius:2px;display:flex;align-items:center;justify-content:center;background:rgba(196,168,130,.04);position:relative;transition:border-color .15s,background .15s}
.slot-num{font-size:20px;color:#C4A882;font-style:italic;pointer-events:none;transition:opacity .15s}
.drop-slot.filled .slot-num{opacity:0}
.drop-slot.drag-over{border-color:#8B7355;border-style:solid;background:rgba(139,115,85,.1)}
.drop-slot.filled{border-style:solid;border-color:#8B7355;background:#D9C5A8}
.drop-slot .word-chip{border:none;background:transparent!important;color:#1A110A!important;font-size:13px;padding:4px 8px}

/* WALL */
.wall-textarea{width:100%;font-family:'Cormorant Garamond',serif;font-size:16px;color:#2C1F12;border:1px solid #C4A882;border-radius:2px;padding:12px;background:#FFFDF9;outline:none;resize:none;min-height:100px;line-height:1.6}
.wall-textarea:focus{border-color:#8B7355}
.char-count{text-align:right;font-size:11px;color:#C4A882;margin-top:.3rem}
.wall-sent{text-align:center;padding:1.5rem;font-style:italic;color:#5A7A4A;font-size:15px;display:none}

/* WORD CLOUD */
.cloud-input-wrap{display:flex;gap:8px;margin-bottom:1rem}
.cloud-input{flex:1;font-family:'Cormorant Garamond',serif;font-size:16px;border:none;border-bottom:1px solid #C4A882;background:transparent;color:#2C1F12;padding:6px 4px;outline:none}
.cloud-input:focus{border-bottom-color:#8B7355}
.cloud-send{padding:7px 18px;font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.08em;border:1px solid #C4A882;border-radius:2px;background:transparent;color:#8B7355;cursor:pointer}
.cloud-send:hover{background:rgba(196,168,130,.14)}
.cloud-sent-words{display:flex;flex-wrap:wrap;gap:6px;margin-top:.8rem;min-height:40px}
.cloud-tag{padding:5px 12px;border:1px solid #C4A882;border-radius:2px;font-size:13px;color:#4A3728;background:#FBF6EF;font-family:'Cormorant Garamond',serif;letter-spacing:.06em}

/* Bottom */
.ex-bottom{margin-top:1.2rem;border-top:.5px solid rgba(196,168,130,.3);padding-top:.8rem}
.quote-strip{text-align:center;font-style:italic;font-size:13px;color:#8B7355;line-height:1.7;min-height:20px;margin-bottom:.3rem}
.status-bar{text-align:center;font-size:12px;color:#888;min-height:18px}
.status-bar.done{color:#5A7A4A;font-style:italic}
</style>
</head>
<body>
<div class="card">
  <div class="orn"><div class="ol"></div><div class="od"></div><div class="ol"></div></div>
  <p class="app-title">По жътва · Елин Пелин</p>
  <p class="app-sub">Литературни дейности</p>

  <div id="name-screen">
    <h2>Добре дошъл!</h2>
    <p>Въведи името си, за да започнеш</p>
    <input id="name-input" type="text" placeholder="Твоето име..." autocomplete="off"/>
    <br>
    <button class="lit-btn" onclick="startActivity()">Започни →</button>
  </div>

  <div id="wait-screen">
    <p>Изчакай учителя да стартира упражнение</p>
    <div class="wait-dots">
      <div class="wait-dot"></div><div class="wait-dot"></div><div class="wait-dot"></div>
    </div>
  </div>

  <div id="ex-screen">
    <div class="ex-header">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="lesson-tag" id="lesson-tag">Урок 1</span>
        <span class="ex-name" id="ex-name-lbl"></span>
      </div>
      <div class="sync-row">
        <div class="sync-dot" id="sync-dot"></div>
        <span class="sync-lbl" id="sync-lbl">свързване...</span>
      </div>
    </div>
    <div id="ex-content"></div>
    <div class="ex-bottom">
      <div class="quote-strip" id="qstrip"></div>
      <div class="status-bar" id="sbar"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyAKOl0KE94gHgNNac1qpEth7BtKFfOQkpo",
  authDomain:"diamant-703f1.firebaseapp.com",
  projectId:"diamant-703f1",
  storageBucket:"diamant-703f1.firebasestorage.app",
  messagingSenderId:"5172210587",
  appId:"1:5172210587:web:64f40c40ffb4c7c00e8f3e",
  databaseURL:"https://diamant-703f1-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = firebase.database();

let studentName='', studentKey='', currentLesson=null, currentEx=null;

const LESSONS = {
  lesson1: {
    label: 'Урок 1',
    title: 'Свещенодействието жътва',
    exercises: {
      wordcloud: { label: 'Облак от думи' }
    }
  },
  lesson2: {
    label: 'Урок 2',
    title: 'Пътят на хляба',
    exercises: {
      diamond: {
        label: 'Диамант на ценностите',
        words: ['ЛЮБОВ','НАДЕЖДА','ПЕСЕН','СЪПРИЧАСТНОСТ','ТРУД'],
        quotes: {
          'ЛЮБОВ':'„…Никола се усмихваше. Пот се сипеше от челото му…"',
          'НАДЕЖДА':'„…не иска да им отнеме лелеяната в душа надежда…"',
          'ПЕСЕН':'„…над златното поле ехтят песни като благодарствени молитви…"',
          'СЪПРИЧАСТНОСТ':'„…И булки и моми, и майки се стекоха на Пенкината нива ужасени…"',
          'ТРУД':'„…Усилна жътва кипи из равното Софийско поле…"'
        }
      },
      wall: { label: 'Стена на емпатията' },
      wordcloud: { label: 'Облак от думи' }
    }
  }
};

window.startActivity = function() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) { document.getElementById('name-input').focus(); return; }
  studentName = val;
  const bg2lat = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sht','ъ':'a','ь':'','ю':'yu','я':'ya'};
  studentKey = val.toLowerCase().replace(/\s+/g,'_').split('').map(c=>bg2lat[c]!==undefined?bg2lat[c]:c).join('').replace(/[^a-z0-9_]/g,'');
  if (!studentKey) studentKey = 'student_' + Date.now();
  document.getElementById('name-screen').style.display='none';
  document.getElementById('wait-screen').style.display='block';

  db.ref('.info/connected').on('value', snap => setSynced(snap.val()===true));
  // Listen for session reset
  db.ref('reset').on('value', snap => {
    if (snap.val() === true) window.location.reload();
  });


  // Listen current lesson
  db.ref('currentLesson').on('value', snap => {
    const lesson = snap.val();
    if (!lesson) return;
    currentLesson = lesson;
    document.getElementById('lesson-tag').textContent = LESSONS[lesson]?.label || lesson;
    // Register under correct lesson
    db.ref(lesson + '/students/' + studentKey + '/name').set(studentName)
      .catch(err => console.error('Register error:', err));
    // Listen exercise for this lesson
    db.ref(lesson + '/currentExercise').on('value', snap2 => {
      const exId = snap2.val();
      if (!exId) {
        currentEx = null;
        document.getElementById('wait-screen').style.display = 'block';
        document.getElementById('ex-screen').style.display = 'none';
        return;
      }
      if (exId !== currentEx) {
        currentEx = exId;
        loadExercise(lesson, exId);
      }
    });
  });
};

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key==='Enter') window.startActivity();
});

function setSynced(ok) {
  document.getElementById('sync-dot').className = 'sync-dot'+(ok?' ok':'');
  document.getElementById('sync-lbl').textContent = ok?'записано':'свързване...';
}

function saveData(path, data) {
  db.ref(currentLesson+'/students/'+studentKey+'/exercises/'+path)
    .set({...data, updatedAt: Date.now()})
    .then(()=>setSynced(true)).catch(()=>setSynced(false));
}

function loadExercise(lesson, exId) {
  document.getElementById('wait-screen').style.display='none';
  document.getElementById('ex-screen').style.display='block';
  const lessonDef = LESSONS[lesson];
  const ex = lessonDef?.exercises[exId];
  document.getElementById('ex-name-lbl').textContent = ex?.label || exId;
  document.getElementById('qstrip').textContent='';
  document.getElementById('sbar').textContent='';
  document.getElementById('sbar').className='status-bar';
  const content = document.getElementById('ex-content');
  content.innerHTML='';
  if (exId==='diamond') buildDiamond(content, ex);
  else if (exId==='wall') buildWall(content);
  else if (exId==='wordcloud') buildWordCloud(content);
}

// ── DIAMOND ──
let dragged=null, dragSrc=null;
function buildDiamond(container, ex) {
  container.innerHTML=`
    <p class="ex-title">Диамантът на ценностите</p>
    <p class="ex-instr">Провлачи думите в клетките на диаманта</p>
    <p class="pool-label">Ценности</p>
    <div class="words-pool" id="pool"></div>
    <p class="diamond-label">Наредете ценностите</p>
    <div class="diamond-wrap" id="dwrap">
      <svg class="conn-svg" id="csvg"></svg>
      <div class="d-row"><div class="drop-slot" id="s0"><span class="slot-num">I</span></div></div>
      <div class="d-row">
        <div class="drop-slot" id="s1"><span class="slot-num">II</span></div>
        <div class="drop-slot" id="s2"><span class="slot-num">III</span></div>
      </div>
      <div class="d-row"><div class="drop-slot" id="s3"><span class="slot-num">IV</span></div></div>
      <div class="d-row"><div class="drop-slot" id="s4"><span class="slot-num">V</span></div></div>
    </div>`;
  const pool = document.getElementById('pool');
  ex.words.forEach(w => pool.appendChild(makeChip(w)));
  pool.ondragover=e=>{e.preventDefault();pool.classList.add('drag-over');};
  pool.ondragleave=()=>pool.classList.remove('drag-over');
  pool.ondrop=e=>{e.preventDefault();pool.classList.remove('drag-over');dropToPool();};
  ['s0','s1','s2','s3','s4'].forEach(id=>{
    const slot=document.getElementById(id);
    slot.ondragover=e=>{e.preventDefault();slot.classList.add('drag-over');};
    slot.ondragleave=()=>slot.classList.remove('drag-over');
    slot.ondrop=e=>{e.preventDefault();dropToSlot(slot);};
  });
  setTimeout(()=>drawConn(),100);
  initTouchDiamond();
}
function makeChip(word) {
  const chip=document.createElement('div');
  chip.className='word-chip';chip.dataset.word=word;
  chip.textContent=word.charAt(0)+word.slice(1).toLowerCase();
  chip.draggable=true;
  chip.ondragstart=e=>{dragged=chip;dragSrc=chip.parentElement;setTimeout(()=>chip.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';};
  chip.ondragend=()=>chip.classList.remove('dragging');
  return chip;
}
function dropToSlot(slot) {
  if(!dragged)return;
  const ex=slot.querySelector('.word-chip');
  if(ex){(dragSrc||document.getElementById('pool')).appendChild(ex);if(!slot.querySelector('.word-chip'))slot.classList.remove('filled');}
  slot.appendChild(dragged);slot.classList.add('filled');
  dragged=null;drawConn();saveDiamond();
}
function dropToPool() {
  if(!dragged)return;
  document.getElementById('pool').appendChild(dragged);
  if(dragSrc&&dragSrc.classList.contains('drop-slot')&&!dragSrc.querySelector('.word-chip'))dragSrc.classList.remove('filled');
  dragged=null;drawConn();saveDiamond();
}
function drawConn() {
  const svg=document.getElementById('csvg'),wrap=document.getElementById('dwrap');
  if(!svg||!wrap)return;
  svg.setAttribute('viewBox','0 0 '+wrap.offsetWidth+' '+wrap.offsetHeight);
  svg.innerHTML='';
  [['s0','s1'],['s0','s2'],['s1','s3'],['s2','s3'],['s3','s4']].forEach(([a,b])=>{
    const sa=document.getElementById(a),sb=document.getElementById(b);
    if(!sa||!sb)return;
    const wr=wrap.getBoundingClientRect(),ra=sa.getBoundingClientRect(),rb=sb.getBoundingClientRect();
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',ra.left-wr.left+ra.width/2);l.setAttribute('y1',ra.top-wr.top+ra.height/2);
    l.setAttribute('x2',rb.left-wr.left+rb.width/2);l.setAttribute('y2',rb.top-wr.top+rb.height/2);
    l.setAttribute('stroke','#C4A882');l.setAttribute('stroke-width','1');
    l.setAttribute('stroke-dasharray','3 4');l.setAttribute('opacity','0.6');
    svg.appendChild(l);
  });
}
function saveDiamond() {
  const slots={};
  ['s0','s1','s2','s3','s4'].forEach(id=>{
    const c=document.getElementById(id)?.querySelector('.word-chip');
    slots[id]=c?c.dataset.word:null;
  });
  const filled=Object.values(slots).filter(Boolean);
  saveData('diamond',{slots});
  const ex=LESSONS[currentLesson]?.exercises?.diamond;
  if(filled.length===5){
    document.getElementById('sbar').textContent='Диамантът е завършен!';
    document.getElementById('sbar').className='status-bar done';
    document.getElementById('qstrip').textContent='„Пак жертва! Град да бе паднал, не би тъй убил сърцата…"';
  } else {
    document.getElementById('sbar').textContent=filled.length>0?filled.length+' от 5 ценности наредени':'';
    if(ex){const words=filled;const q=words.map(w=>ex.quotes&&ex.quotes[w]).filter(Boolean);if(q.length)document.getElementById('qstrip').textContent=q[Math.floor(Math.random()*q.length)];}
  }
}
function initTouchDiamond() {
  let tEl=null,tSrc=null,tClone=null;
  document.addEventListener('touchstart',e=>{
    const chip=e.target.closest('.word-chip');if(!chip)return;e.preventDefault();
    tEl=chip;tSrc=chip.parentElement;chip.classList.add('dragging');
    const r=chip.getBoundingClientRect();
    tClone=chip.cloneNode(true);
    tClone.style.cssText='position:fixed;z-index:9999;opacity:.85;pointer-events:none;width:'+r.width+'px;left:'+r.left+'px;top:'+r.top+'px;margin:0;';
    document.body.appendChild(tClone);
  },{passive:false});
  document.addEventListener('touchmove',e=>{
    if(!tEl)return;e.preventDefault();
    const t=e.touches[0],r=tEl.getBoundingClientRect();
    tClone.style.left=(t.clientX-r.width/2)+'px';tClone.style.top=(t.clientY-r.height/2)+'px';
    document.querySelectorAll('.drop-slot').forEach(s=>s.classList.remove('drag-over'));
    if(tClone)tClone.style.display='none';
    const under=document.elementFromPoint(t.clientX,t.clientY);
    if(tClone)tClone.style.display='';
    const slot=under?.closest('.drop-slot');if(slot)slot.classList.add('drag-over');
  },{passive:false});
  document.addEventListener('touchend',e=>{
    if(!tEl)return;tEl.classList.remove('dragging');
    if(tClone){tClone.remove();tClone=null;}
    document.querySelectorAll('.drop-slot').forEach(s=>s.classList.remove('drag-over'));
    const t=e.changedTouches[0];
    const under=document.elementFromPoint(t.clientX,t.clientY);
    const slot=under?.closest('.drop-slot');const pool=under?.closest('#pool');
    dragged=tEl;dragSrc=tSrc;
    if(slot)dropToSlot(slot);else if(pool||(tSrc&&tSrc.classList.contains('drop-slot')))dropToPool();
    tEl=null;tSrc=null;
  },{passive:false});
}

// ── WALL ──
function buildWall(container) {
  container.innerHTML=`
    <p class="ex-title">Стена на емпатията</p>
    <p class="ex-instr">Напиши едно изречение — послание към Никола</p>
    <textarea class="wall-textarea" id="wall-text" maxlength="200" placeholder="Какво бих казал на Никола..."></textarea>
    <div class="char-count"><span id="char-n">0</span>/200</div>
    <div style="text-align:center;margin-top:.8rem">
      <button class="lit-btn" id="wall-send-btn" onclick="sendWall()">Изпрати →</button>
    </div>
    <div class="wall-sent" id="wall-sent">✓ Посланието е изпратено!</div>`;
  document.getElementById('wall-text').addEventListener('input',function(){document.getElementById('char-n').textContent=this.value.length;});
  db.ref(currentLesson+'/students/'+studentKey+'/exercises/wall').once('value',snap=>{
    const v=snap.val();if(v&&v.text){document.getElementById('wall-text').value=v.text;document.getElementById('char-n').textContent=v.text.length;showWallSent();}
  });
  window.sendWall=function(){
    const text=document.getElementById('wall-text').value.trim();if(!text)return;
    saveData('wall',{text,name:studentName});
    showWallSent();
  };
  function showWallSent(){
    document.getElementById('wall-send-btn').style.display='none';
    document.getElementById('wall-sent').style.display='block';
    document.getElementById('wall-text').disabled=true;
    document.getElementById('sbar').textContent='Посланието е записано.';
    document.getElementById('sbar').className='status-bar done';
  }
}

// ── WORD CLOUD ──
function buildWordCloud(container) {
  let sentWords=[];
  container.innerHTML=`
    <p class="ex-title">Облак от думи</p>
    <p class="ex-instr">Изпрати до 5 думи — по една наведнъж</p>
    <div class="cloud-input-wrap">
      <input class="cloud-input" id="cloud-input" type="text" maxlength="30" placeholder="Напиши дума..."/>
      <button class="cloud-send" id="cloud-btn" onclick="sendWord()">Изпрати</button>
    </div>
    <div class="cloud-sent-words" id="cloud-sent"></div>
    <div style="text-align:center;font-size:12px;font-style:italic;color:#8B7355;margin-top:.5rem" id="cloud-limit"></div>`;
  document.getElementById('cloud-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendWord();});

  // Listen for changes — handles both initial load and reset by teacher
  db.ref(currentLesson+'/students/'+studentKey+'/exercises/wordcloud').on('value', snap=>{
    const v=snap.val();
    if(v&&v.words){
      sentWords=[...v.words];
    } else {
      sentWords=[];
    }
    renderSentWords();
  });
  window.sendWord=function(){
    if(sentWords.length>=5)return;
    const input=document.getElementById('cloud-input');
    const word=input.value.trim();if(!word)return;
    sentWords.push(word);input.value='';
    saveData('wordcloud',{words:sentWords,name:studentName});
    renderSentWords();
  };
  function renderSentWords(){
    const cont=document.getElementById('cloud-sent'),lim=document.getElementById('cloud-limit'),btn=document.getElementById('cloud-btn');
    if(!cont)return;
    cont.innerHTML='';
    sentWords.forEach(w=>{const tag=document.createElement('div');tag.className='cloud-tag';tag.textContent=w;cont.appendChild(tag);});
    const rem=5-sentWords.length;
    lim.textContent=rem>0?'Можеш да изпратиш още '+rem+' дума'+(rem===1?'':'')+'...':'Достигнат лимит от 5 думи.';
    if(sentWords.length>=5){btn.disabled=true;document.getElementById('cloud-input').disabled=true;}
    document.getElementById('sbar').textContent=sentWords.length>0?sentWords.length+' дума'+(sentWords.length===1?'':'')+'  изпратена':'';
    document.getElementById('sbar').className=sentWords.length>0?'status-bar done':'status-bar';
  }
}

window.addEventListener('resize',()=>{if(currentEx==='diamond')drawConn();});
</script>
</body>
</html>
