<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мониторинг</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#FFFFFF;min-height:100vh;padding:1.2rem;font-family:'Cormorant Garamond',Georgia,serif}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px solid #D0D0D0}
.header h1{font-size:20px;font-style:italic;font-weight:600;color:#1A1A1A}
.header p{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#888888;margin-top:2px}
.hright{display:flex;align-items:center;gap:12px}
.live{display:inline-flex;align-items:center;gap:5px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#2E7D32;padding:3px 10px;border:1px solid rgba(46,125,50,.4);border-radius:2px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#5A7A4A;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.cnt{font-size:11px;color:#555555}
.lesson-badge{font-size:12px;font-style:italic;font-weight:600;color:#555555;border:.5px solid #CCCCCC;padding:3px 12px;border-radius:2px}
.ex-lbl{font-size:12px;font-style:italic;color:#555555;letter-spacing:.06em}
.orn{display:flex;align-items:center;gap:8px;margin:.6rem 0 1rem}
.ol{height:1px;flex:1;background:linear-gradient(to right,transparent,#AAAAAA,transparent)}
.od{width:5px;height:5px;background:#888888;transform:rotate(45deg);flex-shrink:0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.card{background:#FFFFFF;border:1px solid #DDDDDD;border-radius:3px;padding:.9rem;transition:border-color .3s,transform .2s}
.card.complete{border-color:#2E7D32}
.card.partial{border-color:#888888}
.card.waiting{opacity:.55}
.card.spotlight{border-color:#1A1A1A;transform:scale(1.03);box-shadow:0 0 0 2px rgba(0,0,0,.15)}
.s-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:.5px solid #E0E0E0}
.s-name{font-size:13px;font-weight:600;color:#1A1A1A}
.s-status{font-size:9px;letter-spacing:.08em;text-transform:uppercase}
.s-status.done{color:#2E7D32}
.s-status.partial{color:#555555}
.s-status.wait{color:#AAAAAA}
.mini-d{display:flex;flex-direction:column;align-items:center;gap:4px}
.mini-row{display:flex;gap:4px;justify-content:center}
.mini-conn{width:1px;height:5px;background:#CCCCCC}
.mini-slot{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:3px 5px;min-height:22px;min-width:60px;border:.5px solid #DDDDDD;color:#AAAAAA;background:#F8F8F8;font-family:'Cormorant Garamond',serif}
.mini-slot.ЛЮБОВ{background:#EDE0CC;border-color:#8B7355;color:#2C1F12}
.mini-slot.НАДЕЖДА{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.mini-slot.ПЕСЕН{background:#FAEEDA;border-color:#EF9F27;color:#412402}
.mini-slot.СЪПРИЧАСТНОСТ{background:#FAECE7;border-color:#D85A30;color:#4A1B0C;font-size:7px}
.mini-slot.ТРУД{background:#F1EFE8;border-color:#888780;color:#2C2C2A}
.mini-wall{font-size:11px;font-style:italic;color:#1A1A1A;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.mini-cloud{display:flex;flex-wrap:wrap;gap:4px}
.mini-tag{padding:2px 7px;border:.5px solid #CCCCCC;border-radius:2px;font-size:9px;color:#1A1A1A;background:#F5F5F5;font-family:'Cormorant Garamond',serif}
.spotlight-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:2rem}
.spotlight-overlay.open{display:flex}
.spotlight-card{background:#FFFFFF;border:1px solid #CCCCCC;border-radius:3px;padding:2rem 2.5rem;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;animation:fin .2s ease}
@keyframes fin{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.sp-name{text-align:center;font-size:22px;font-weight:600;font-style:italic;color:#1A1A1A;margin-bottom:.2rem}
.sp-sub{text-align:center;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#666666;margin-bottom:1.5rem}
.big-d{display:flex;flex-direction:column;align-items:center;gap:8px}
.big-row{display:flex;gap:10px;justify-content:center}
.big-conn{width:1px;height:14px;background:#CCCCCC}
.big-slot{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:12px 18px;min-height:52px;min-width:140px;border:1px solid #DDDDDD;color:#AAAAAA;background:#F8F8F8;font-family:'Cormorant Garamond',serif}
.big-slot.ЛЮБОВ{background:#EDE0CC;border-color:#8B7355;color:#2C1F12}
.big-slot.НАДЕЖДА{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.big-slot.ПЕСЕН{background:#FAEEDA;border-color:#EF9F27;color:#412402}
.big-slot.СЪПРИЧАСТНОСТ{background:#FAECE7;border-color:#D85A30;color:#4A1B0C;font-size:11px}
.big-slot.ТРУД{background:#F1EFE8;border-color:#888780;color:#2C2C2A}
.big-wall-text{font-size:17px;font-style:italic;color:#1A1A1A;line-height:1.9;text-align:center;padding:1rem;border:.5px solid #E0E0E0;border-radius:2px;background:#FAFAFA}
.big-cloud{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.big-tag{padding:7px 18px;border:1px solid #CCCCCC;border-radius:2px;font-size:15px;color:#1A1A1A;background:#F5F5F5;font-family:'Cormorant Garamond',serif;letter-spacing:.06em}
.empty-msg{text-align:center;padding:3rem;font-style:italic;font-size:15px;color:#888888;grid-column:1/-1}
.qr-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem}
.qr-overlay.open{display:flex}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>Мониторинг на класа</h1>
    <p>По жътва · Елин Пелин</p>
  </div>
  <div class="hright">
    <span class="lesson-badge" id="lesson-badge">—</span>
    <span class="ex-lbl" id="ex-lbl">Няма активно упражнение</span>
    <span class="cnt" id="cnt">0 ученика</span>
    <span class="live"><span class="live-dot"></span>На живо</span>
  </div>
</div>
<div class="orn"><div class="ol"></div><div class="od"></div><div class="ol"></div></div>
<div class="grid" id="grid"><div class="empty-msg">Чакаме учителя да избере урок...</div></div>

<div class="spotlight-overlay" id="spotlight">
  <div class="spotlight-card">
    <div class="sp-name" id="sp-name"></div>
    <div class="sp-sub" id="sp-sub"></div>
    <div id="sp-content"></div>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAKOl0KE94gHgNNac1qpEth7BtKFfOQkpo",
  authDomain:"diamant-703f1.firebaseapp.com",
  projectId:"diamant-703f1",
  storageBucket:"diamant-703f1.firebasestorage.app",
  messagingSenderId:"5172210587",
  appId:"1:5172210587:web:64f40c40ffb4c7c00e8f3e",
  databaseURL:"https://diamant-703f1-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = firebase.database();

const LESSONS = {
  lesson1: { label:'Урок 1', exercises:{ wordcloud:'Облак от думи' } },
  lesson2: { label:'Урок 2', exercises:{ diamond:'Диамант на ценностите', wall:'Стена на емпатията', wordcloud:'Облак от думи' } }
};

let currentLesson=null, currentEx=null, studentsData={}, spotlightKey=null, monSummaryExId=null;

// Listen current lesson
db.ref('currentLesson').on('value', snap => {
  const lesson = snap.val();
  if (!lesson) return;
  currentLesson = lesson;
  const L = LESSONS[lesson];
  document.getElementById('lesson-badge').textContent = L?.label || lesson;
  listenLesson(lesson);
});

function listenLesson(lesson) {
  db.ref(lesson+'/currentExercise').on('value', snap => {
    currentEx = snap.val();
    const L = LESSONS[lesson];
    document.getElementById('ex-lbl').textContent = currentEx ? (L?.exercises[currentEx]||currentEx) : 'Няма активно упражнение';
    renderGrid();
  });
  db.ref(lesson+'/students').on('value', snap => {
    studentsData = snap.val()||{};
    document.getElementById('cnt').textContent = Object.keys(studentsData).length + ' ученика';
    renderGrid();
    if (spotlightKey==='__summary__' && monSummaryExId) renderMonSummary(monSummaryExId);
    else if (spotlightKey && studentsData[spotlightKey]) renderSpotlightContent(studentsData[spotlightKey], currentEx);
  });
  db.ref(lesson+'/spotlight').on('value', snap => {
    const key = snap.val();
    if (key==='__summary__') {
      spotlightKey='__summary__';
      db.ref(lesson+'/spotlightSummary').once('value', s2 => {
        const info=s2.val(); if(info) openSummarySpotlight(info.exId);
      });
    } else if (key && studentsData[key]) {
      spotlightKey=key; openSpotlight(key);
    } else {
      spotlightKey=null;
      document.getElementById('spotlight').classList.remove('open');
      renderGrid();
    }
  });
  db.ref(lesson+'/showQR').on('value', snap => {
    document.getElementById('qr-overlay').className = 'qr-overlay'+(snap.val()?' open':'');
  });
}

function getStatus(exData,exId) {
  if(!exId||!exData) return {cls:'waiting',txt:'чака...'};
  if(exId==='diamond'){const n=Object.values(exData.slots||{}).filter(Boolean).length;if(n===5)return{cls:'complete',txt:'✓ завършен'};if(n>0)return{cls:'partial',txt:n+'/5'};return{cls:'waiting',txt:'не е започнал'};}
  if(exId==='wall') return exData.text?{cls:'complete',txt:'✓ изпратено'}:{cls:'waiting',txt:'не е написал'};
  if(exId==='wordcloud'){const n=(exData.words||[]).length;return n>0?{cls:n>=5?'complete':'partial',txt:n+'/5 думи'}:{cls:'waiting',txt:'не е изпратил'};}
  return{cls:'waiting',txt:'чака...'};
}

function miniView(exData,exId) {
  if(!exId||!exData) return '<div style="font-size:11px;font-style:italic;color:#C4A882;text-align:center;padding:.5rem">Изчаква упражнение</div>';
  if(exId==='diamond'){const slots=exData.slots||{};const layout=[['s0'],['s1','s2'],['s3'],['s4']];let h='<div class="mini-d">';layout.forEach((row,ri)=>{if(ri>0)h+='<div class="mini-conn"></div>';h+='<div class="mini-row">';row.forEach(id=>{const w=slots[id];h+='<div class="mini-slot'+(w?' '+w:'')+'">'+( w||'—')+'</div>';});h+='</div>';});return h+'</div>';}
  if(exId==='wall') return '<div class="mini-wall">'+(exData.text||'—')+'</div>';
  if(exId==='wordcloud'){const words=exData.words||[];return'<div class="mini-cloud">'+words.map(w=>'<div class="mini-tag">'+w+'</div>').join('')+'</div>';}
  return'';
}

function renderGrid() {
  const grid=document.getElementById('grid');
  const entries=Object.entries(studentsData).sort(([,a],[,b])=>(a.name||'').localeCompare(b.name||''));
  if(!entries.length){grid.innerHTML='<div class="empty-msg">Чакаме учениците да се включат...</div>';return;}
  grid.innerHTML='';
  entries.forEach(([key,student])=>{
    const exData=currentEx&&student.exercises?student.exercises[currentEx]:null;
    const{cls,txt}=getStatus(exData,currentEx);
    const card=document.createElement('div');
    card.className='card '+cls+(key===spotlightKey?' spotlight':'');
    card.innerHTML='<div class="s-hdr"><span class="s-name">'+(student.name||'?')+'</span><span class="s-status '+(cls==='complete'?'done':cls==='partial'?'partial':'wait')+'">'+txt+'</span></div>'+miniView(exData,currentEx);
    grid.appendChild(card);
  });
}

function openSpotlight(key) {
  const student=studentsData[key]; if(!student)return;
  document.getElementById('sp-name').textContent=student.name||'?';
  const L=LESSONS[currentLesson];
  document.getElementById('sp-sub').textContent=currentEx?(L?.exercises[currentEx]||currentEx):'';
  renderSpotlightContent(student,currentEx);
  document.getElementById('spotlight').classList.add('open');
  renderGrid();
}

function renderSpotlightContent(student,exId) {
  const c=document.getElementById('sp-content');
  const exData=exId&&student.exercises?student.exercises[exId]:null;
  if(!exId||!exData){c.innerHTML='<p style="text-align:center;font-style:italic;color:#8B7355;margin-top:1rem">Ученикът изчаква.</p>';return;}
  if(exId==='diamond'){const slots=exData.slots||{};const layout=[['s0'],['s1','s2'],['s3'],['s4']];let h='<div class="big-d">';layout.forEach((row,ri)=>{if(ri>0)h+='<div class="big-conn"></div>';h+='<div class="big-row">';row.forEach(id=>{const w=slots[id];h+='<div class="big-slot'+(w?' '+w:'')+'">'+( w||'—')+'</div>';});h+='</div>';});c.innerHTML=h+'</div>';}
  else if(exId==='wall')c.innerHTML='<div class="big-wall-text">'+(exData.text||'—')+'</div>';
  else if(exId==='wordcloud'){const words=exData.words||[];c.innerHTML='<div class="big-cloud">'+words.map(w=>'<div class="big-tag">'+w+'</div>').join('')+'</div>';}
}

function renderMonSummary(exId) {
  const all=Object.values(studentsData);
  const c=document.getElementById('sp-content'); if(!c)return;
  if(exId==='wall'){
    const entries=all.filter(s=>s.exercises&&s.exercises.wall&&s.exercises.wall.text);
    if(!entries.length)c.innerHTML='<p style="text-align:center;font-style:italic;color:#8B7355;margin-top:1rem">Няма изречения все още.</p>';
    else c.innerHTML='<div style="display:flex;flex-direction:column;gap:10px">'+entries.map(s=>'<div style="padding:.8rem;border:.5px solid rgba(196,168,130,.4);border-radius:2px;background:rgba(196,168,130,.04)"><div class="big-wall-text" style="font-size:17px">„'+s.exercises.wall.text+'“</div></div>').join('')+'</div>';
  } else if(exId==='wordcloud'){
    const wordMap={};
    all.forEach(s=>{if(s.exercises&&s.exercises.wordcloud&&s.exercises.wordcloud.words)s.exercises.wordcloud.words.forEach(w=>{wordMap[w]=(wordMap[w]||0)+1;});});
    const sorted=Object.entries(wordMap).sort(([,a],[,b])=>b-a);
    if(!sorted.length)c.innerHTML='<p style="text-align:center;font-style:italic;color:#8B7355;margin-top:1rem">Няма думи все още.</p>';
    else{const mx=sorted[0][1];c.innerHTML='<div class="big-cloud">'+sorted.map(([w,n])=>{const sz=14+Math.round((n/mx)*14);return'<div class="big-tag" style="font-size:'+sz+'px">'+w+(n>1?'<span style="font-size:10px;color:#8B7355;margin-left:5px">×'+n+'</span>':'')+'</div>';}).join('')+'</div>';}
  }
}

function openSummarySpotlight(exId) {
  monSummaryExId=exId;
  document.getElementById('sp-name').textContent='Обобщение';
  const L=LESSONS[currentLesson];
  document.getElementById('sp-sub').textContent=L?.exercises[exId]||exId;
  renderMonSummary(exId);
  document.getElementById('spotlight').classList.add('open');
}

// Listen for session reset
db.ref('reset').on('value', snap => {
  if (snap.val() === true) window.location.reload();
});
</script>
